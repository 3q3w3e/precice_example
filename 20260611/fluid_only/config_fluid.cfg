%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SU2 config - fluid-only Turek-Hron channel case.
% No preCICE coupling, no mesh deformation, no restart input/output.
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% ----------------------------- SOLVER ----------------------------------------%
SOLVER= INC_NAVIER_STOKES
MATH_PROBLEM= DIRECT

% --------------------------- FLOW PROPERTIES ---------------------------------%
INC_NONDIM= DIMENSIONAL
INC_DENSITY_MODEL= CONSTANT
INC_DENSITY_INIT= 1000.0
INC_VELOCITY_INIT= (1.0, 0.0, 0.0)
INC_ENERGY_EQUATION= NO
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1.0

% ------------------------------- INPUT ---------------------------------------%
MESH_FORMAT= SU2
MESH_FILENAME= fluid.su2

% -------------------------- BOUNDARY CONDITIONS ------------------------------%
SPECIFIED_INLET_PROFILE= YES
INLET_FILENAME= inlet_00000.dat
INC_INLET_TYPE= VELOCITY_INLET
MARKER_INLET= ( inlet, 0.0, 1.0, 1.0, 0.0, 0.0 )

INC_OUTLET_TYPE= PRESSURE_OUTLET
MARKER_OUTLET= ( outlet, 0.0 )

MARKER_HEATFLUX= ( wall_top, 0.0, wall_bot, 0.0, beam_wet, 0.0, cylinder, 0.0 )
MARKER_MONITORING= ( cylinder, beam_wet )
AOA= 0.0

% ----------------------------- TIME MARCHING ---------------------------------%
TIME_DOMAIN= YES
TIME_MARCHING= DUAL_TIME_STEPPING-2ND_ORDER
TIME_STEP= 0.002
MAX_TIME= 15
TIME_ITER= 7500
INNER_ITER= 400

% ---------------------------- NUMERICAL METHOD -------------------------------%
NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
CONV_NUM_METHOD_FLOW= FDS
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= NONE
TIME_DISCRE_FLOW= EULER_IMPLICIT

CFL_NUMBER= 10.0
CFL_ADAPT= YES
CFL_ADAPT_PARAM= ( 0.5, 1.5, 5.0, 50.0 )
MGLEVEL= 0

% ----------------------------- LINEAR SOLVER ---------------------------------%
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-8
LINEAR_SOLVER_ITER= 20

% -------------------------- CONVERGENCE CRITERIA -----------------------------%
CONV_FIELD= RMS_PRESSURE
CONV_RESIDUAL_MINVAL= -6
CONV_STARTITER= 10

% --------------------------- SCREEN/HISTORY/VOLUME ---------------------------%
SCREEN_OUTPUT= (INNER_ITER, RMS_PRESSURE, RMS_VELOCITY-X, RMS_VELOCITY-Y)
HISTORY_OUTPUT= (ITER, WALL_TIME, RMS_RES, CFL_NUMBER, FORCE_X, FORCE_Y, LINSOL)
VOLUME_OUTPUT= (COORDINATES, SOLUTION, PRIMITIVE)

% ----------------------------- OUTPUT ----------------------------------------%
OUTPUT_FILES= (PARAVIEW, SURFACE_PARAVIEW)
OUTPUT_WRT_FREQ= (1, 1)
CONV_FILENAME= history
VOLUME_FILENAME= flow
SURFACE_FILENAME= surface_flow
