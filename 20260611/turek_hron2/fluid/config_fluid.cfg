%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SU2 config — Fluid participant for the 2D "cantilever in channel" FSI benchmark.
% Standalone single-zone version driven step-by-step by SU2_preCICE_FSI.py (preCICE).
% Physical conditions and marker names from the SU2 multiphysics tutorial
% (coarse_withinitial_dt5 / config_channel.cfg).  SU2 v8.x, INCOMPRESSIBLE NS.
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% ----------------------------- SOLVER ----------------------------------------%
SOLVER= INC_NAVIER_STOKES
MATH_PROBLEM= DIRECT
RESTART_SOL = NO
%SOLUTION_FILENAME = restarts/channel_steady
RESTART_ITER = 2

% --------------------------- FLOW PROPERTIES ---------------------------------% 여기 수정 
INC_NONDIM= DIMENSIONAL
INC_DENSITY_MODEL= CONSTANT
INC_DENSITY_INIT= 1000.0
INC_VELOCITY_INIT= (1.0,0,0) % CFD2기준 initialize어차피 큰의미는 없음 
INC_ENERGY_EQUATION= NO
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1.0

% ------------------------------- INPUT ---------------------------------------%
MESH_FORMAT= SU2
MESH_FILENAME= fluid.su2

% -------------------------- BOUNDARY CONDITIONS ------------------------------%
SPECIFIED_INLET_PROFILE= YES
INLET_FILENAME= inlet.dat
MARKER_INLET= ( inlet, 0.0, 1.0, 1.0, 0.0, 0.0 ) 
INC_INLET_TYPE= VELOCITY_INLET
%MARKER_INLET= ( inlet, 0.0, 1.0, 1.0, 0.0, 0.0 ) %어차피 덮어쓸텐데 그냥 둠



INC_OUTLET_TYPE= PRESSURE_OUTLET
MARKER_OUTLET= ( outlet, 0.0 )



MARKER_HEATFLUX= ( wall_top, 0.0, wall_bot, 0.0, beam_wet, 0.0, cylinder, 0.0 )
MARKER_MONITORING= ( cylinder, beam_wet ) 
AOA= 0.0                  % DRAG = Fx(유동방향), LIFT = Fy(수직)


% -------------------------- COUPLING / DEFORMATION ---------------------------%
% NOTE: do NOT set MARKER_FLUID_LOAD here. That keyword is for SU2's own multiphysics
% (built-in FSI) driver; on a single-zone fluid driven externally (preCICE) it makes
% the mesh solver try to derive grid velocity from a structural boundary velocity that
% doesn't exist -> "It is not possible to compute grid velocity from boundary velocity
% for single zone problems". MARKER_DEFORM_MESH below is what we need; GetMarkerFlowLoad()
% returns the traction on the deform marker without MARKER_FLUID_LOAD.


DEFORM_MESH= YES
MARKER_DEFORM_MESH= ( beam_wet )
DEFORM_STIFFNESS_TYPE= WALL_DISTANCE
DEFORM_LINEAR_SOLVER= CONJUGATE_GRADIENT
DEFORM_LINEAR_SOLVER_PREC= ILU
DEFORM_LINEAR_SOLVER_ERROR= 1E-8
DEFORM_LINEAR_SOLVER_ITER= 1000
DEFORM_CONSOLE_OUTPUT= NO

% ----------------------------- TIME MARCHING ---------------------------------%
TIME_DOMAIN= YES
TIME_MARCHING= DUAL_TIME_STEPPING-2ND_ORDER
% Keep equal to the preCICE <time-window-size>.
TIME_STEP= 0.002
MAX_TIME= 15
% physical-step cap (preCICE actually controls the time loop)
TIME_ITER= 999999
% dual-time inner iterations per physical step (cap; CONV_RESIDUAL_MINVAL stops earlier)
INNER_ITER= 400

% ---------------------------- NUMERICAL METHOD -------------------------------%
NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
CONV_NUM_METHOD_FLOW= FDS
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= NONE
TIME_DISCRE_FLOW= EULER_IMPLICIT

% pseudo-time CFL for the inner loop; CFL_ADAPT backs it off if the residual misbehaves
% (relevant once the flag deflects and the mesh deforms).
CFL_NUMBER= 10.0
CFL_ADAPT= YES
% ( factor-down, factor-up, CFL-min, CFL-max )
CFL_ADAPT_PARAM= ( 0.5, 1.5, 5.0, 50.0 )

% no multigrid (MG hurts convergence on small deforming meshes)
MGLEVEL= 0

% ----------------------------- LINEAR SOLVER ---------------------------------%
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-8
LINEAR_SOLVER_ITER= 20

% -------------------------- CONVERGENCE CRITERIA -----------------------------%
CONV_FIELD= RMS_PRESSURE
CONV_RESIDUAL_MINVAL= -6
CONV_STARTITER= 10

% --------------------------- SCREEN/HISTORY/VOLUME ---------------------------%
SCREEN_OUTPUT= (INNER_ITER, RMS_PRESSURE, RMS_VELOCITY-X, RMS_VELOCITY-Y)
HISTORY_OUTPUT= (ITER ,WALL_TIME, RMS_RES, CFL_NUMBER, FORCE_X ,FORCE_Y, LINSOL)
VOLUME_OUTPUT= (COORDINATES, SOLUTION, PRIMITIVE)

% ----------------------------- INPUT/OUTPUT ----------------------------------%
OUTPUT_FILES= (PARAVIEW,SURFACE_PARAVIEW, RESTART)
OUTPUT_WRT_FREQ= (1, 1, 1)
CONV_FILENAME= history
VOLUME_FILENAME= flow
RESTART_FILENAME= restart_flow.dat
surface_filename= surface_flow
READ_BINARY_RESTART= YES
